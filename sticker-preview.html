<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sticker preview · ExtraSpaceScam</title>
  <style>
    body {
      margin: 0;
      padding: 1.5rem;
      font-family: system-ui, sans-serif;
      background: #555;
      color: #fff;
    }
    h1 { font-size: 1rem; font-weight: 600; margin: 0 0 0.5rem; }
    .row { margin-bottom: 2rem; }
    .card {
      display: inline-block;
      background: #fff;
      padding: 12px;
      border-radius: 8px;
      max-width: 100%;
    }
    .card img {
      display: block;
      width: min(920px, 92vw);
      height: auto;
    }
    p.note { font-size: 0.85rem; opacity: 0.9; max-width: 40rem; margin-top: 0.75rem; }
  </style>
</head>
<body>
  <p class="note">If a raw <code>.svg</code> will not open, use this page or open the file from the browser menu: File &rarr; Open File.</p>

  <div class="row">
    <h1>Square — &ldquo;Getting ripped off?&rdquo; (working QR)</h1>
    <p class="note">Uses <code>assets/qr-extraspacescam-400.png</code> next to the SVG. Scan with your phone to confirm before printing.</p>
    <div class="card">
      <img src="assets/sticker-getting-ripped-off.svg" width="1000" height="1000" alt="Square sticker with QR to extraspacescam.com" style="width: min(420px, 88vw);">
    </div>
  </div>

  <div class="row">
    <h1>Lime (site colors)</h1>
    <div class="card">
      <img src="assets/sticker-promo-lime.svg" width="1200" height="675" alt="Lime promo sticker preview">
    </div>
  </div>

  <div class="row">
    <h1>Black on white</h1>
    <div class="card">
      <img src="assets/sticker-promo-bw.svg" width="1200" height="675" alt="Black on white sticker preview">
    </div>
  </div>
</body>
</html>
