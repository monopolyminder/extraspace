<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Square sticker preview · ExtraSpaceScam</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 1.25rem;
      font-family: system-ui, sans-serif;
      background: #6a6a6a;
      color: #fff;
    }
    main {
      max-width: 520px;
      margin: 0 auto;
      background: #fff;
      padding: 1rem;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }
    h1 {
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
      color: #222;
    }
    p { font-size: 0.85rem; color: #444; margin: 0 0 1rem; line-height: 1.45; }
    img {
      display: block;
      width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <main>
    <h1>Sticker: Getting ripped off?</h1>
    <p>QR is embedded in the SVG, so you can also open <code>assets/sticker-getting-ripped-off.svg</code> directly in a browser (double-click or File &rarr; Open).</p>
    <img src="assets/sticker-getting-ripped-off.svg" width="1000" height="1000" alt="Square sticker with QR code">
  </main>
</body>
</html>
